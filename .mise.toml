[tools]
python = "3.14"

[env]
# Non-secret run configuration (safe to commit)
OPTIMIZER_GPT = "gpt-3.5-turbo"
SCORER_TEXT = "text-bison"
INSTRUCTION_POS = "Q_begin"
DATASET = "gsm8k"
TASK = "train"
# Secrets (PALM_API_KEY, OPENAI_API_KEY) loaded from git-ignored .mise.env
_.file = ".mise.env"

[tasks.optimize]
description = "Run the instruction optimization script"
run = "uv run opro/optimization/optimize_instructions.py --optimizer=\"${OPTIMIZER_GPT}\" --scorer=\"${SCORER_TEXT}\" --instruction_pos=\"${INSTRUCTION_POS}\" --dataset=\"${DATASET}\" --task=\"${TASK}\" --palm_api_key=\"${PALM_API_KEY}\" --openai_api_key=\"${OPENAI_API_KEY}\""

[tasks.evaluate]
description = "Evaluate instructions on the test fold"
run = "uv run opro/evaluation/evaluate_instructions.py --scorer=\"${SCORER_TEXT}\" --dataset=\"${DATASET}\" --task=\"test\" --instruction_pos=\"${INSTRUCTION_POS}\" --evaluate_training_fold=false --evaluate_test_fold=true --palm_api_key=\"${PALM_API_KEY}\" --openai_api_key=\"${OPENAI_API_KEY}\""
